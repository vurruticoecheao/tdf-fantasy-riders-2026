<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tour de France Fantasy Riders 2026</title>
  <meta name="description" content="Base interactiva de riders del Tour de France Fantasy 2026 con filtros, ranking y exportacion.">
  <link rel="icon" href="data:,">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div>
      <p class="eyebrow">Tour de France 2026</p>
      <h1>Fantasy Riders Database</h1>
    </div>
  </header>

  <main>
    <section class="filters" aria-label="Filtros">
      <div class="filters-heading">
        <h2>Filters and Sorting</h2>
        <span id="visibleCount">0</span>
      </div>

      <div class="filter-grid">
        <div class="filter-block search-block">
          <label for="searchInput">Riders</label>
          <input id="searchInput" type="search" placeholder="Search rider, team, category or number">
        </div>

        <div class="filter-block">
          <label for="categoryFilter">Category</label>
          <select id="categoryFilter">
            <option value="">All categories</option>
          </select>
        </div>

        <div class="filter-block">
          <label for="teamFilter">Team</label>
          <select id="teamFilter">
            <option value="">All teams</option>
          </select>
        </div>

        <div class="filter-block number-block">
          <label for="minPrice">Min. price</label>
          <input id="minPrice" type="number" min="0" step="1">
        </div>

        <div class="filter-block number-block">
          <label for="maxPrice">Max. price</label>
          <input id="maxPrice" type="number" min="0" step="1">
        </div>

        <div class="filter-block">
          <label for="sortSelect">Sort by</label>
          <select id="sortSelect">
            <option value="value-desc">Points/Credit (best)</option>
            <option value="price-asc">Price: low to high</option>
            <option value="price-desc">Price: high to low</option>
            <option value="pcs-desc">PCS 2026: high to low</option>
            <option value="rank-asc">PCS Rank: best</option>
            <option value="jersey-asc">Race number</option>
            <option value="name-asc">Rider: A-Z</option>
          </select>
        </div>

        <div class="filter-actions">
          <button class="primary-button" id="downloadCsv" type="button">CSV</button>
          <button class="clear-button" id="resetFilters" type="button" title="Clear filters" aria-label="Clear filters">X</button>
        </div>
      </div>
    </section>

    <section class="table-panel" aria-label="Tabla de riders">
      <div class="table-toolbar">
        <p id="activeFilters">No active filters</p>
        <div class="legend">
          <span><i class="tier-dot excellent"></i>Excellent</span>
          <span><i class="tier-dot great"></i>Great</span>
          <span><i class="tier-dot good"></i>Good</span>
          <span><i class="tier-dot average"></i>Average</span>
          <span><i class="tier-dot poor"></i>Poor</span>
        </div>
      </div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Dorsal</th>
              <th>Rider</th>
              <th>Equipo</th>
              <th>Categoria</th>
              <th>PCS 2026</th>
              <th>PCS 12m</th>
              <th>Wins</th>
              <th>Value</th>
              <th>Tier</th>
              <th>Precio</th>
              <th>PCS Rank</th>
              <th>PCS</th>
            </tr>
          </thead>
          <tbody id="ridersBody">
            <tr>
              <td colspan="12" class="loading">Cargando riders...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <footer>
    <span>Datos base: Fantasy TdF Helper + dorsales oficiales de letour.fr.</span>
    <span id="lastUpdated"></span>
  </footer>

  <script src="app.js"></script>
</body>
</html>
